
<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honeymoon Diary 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; -webkit-tap-highlight-color: transparent; background-color: #F5E8DD; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sticker-shadow { box-shadow: 6px 6px 0px 0px #2D2D2D; }
        .sticker-active:active { box-shadow: 2px 2px 0px 0px #2D2D2D; transform: translate(2px, 2px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- 完整靜態數據 ---
        const HOTELS = {
            rome: { name: 'Domus Appia 154', address: 'Via Appia Nuova, 154, Rome', checkIn: '15:00', checkOut: '10:00', breakfast: true },
            barcelona: { name: 'Aparthotel Silver', address: 'Carrer de Calaf, 22, Barcelona', checkIn: '15:00', checkOut: '11:00', breakfast: false },
            bangkok1: { name: 'Gardina Asoke', checkIn: '14:00', checkOut: '12:00', breakfast: false },
            bangkok2: { name: 'Eastin Grand Phayathai', checkIn: '14:00', checkOut: '12:00', breakfast: true }
        };

        const INITIAL_DAILY_PLANS = [
            { date: '5/21', city: '台北 ➔ 曼谷', weather: '晴 34°C', items: [{ id: '1', time: '09:30', title: '機場接送：基隆 ➔ 桃機', icon: '🚗', highlight: true }, { id: '2', time: '13:30', title: 'TPE 起飛', icon: '✈️' }] },
            { date: '5/22', city: '羅馬 (Rome)', weather: '晴 22°C', hotel: HOTELS.rome, items: [{ id: '3', time: '09:50', title: '抵達羅馬 FCO', icon: '🇮🇹' }, { id: '4', time: '11:00', title: '機場接送：FCO ➔ 飯店', icon: '🚗' }, { id: '5', time: '15:00', title: '飯店 Check-in', icon: '🔑' }] },
            { date: '5/23', city: '羅馬', weather: '晴 24°C', hotel: HOTELS.rome, items: [{ id: '6', time: '10:30', title: '梵蒂岡博物館 (預約)', icon: '🏛️', highlight: true }] },
            { date: '5/24', city: '羅馬', weather: '晴 23°C', hotel: HOTELS.rome, items: [{ id: '7', time: '12:10', title: '羅馬競技場 (預約)', icon: '⚔️', highlight: true }] },
            { date: '5/25', city: '郵輪 ➔ 羅馬', weather: '海風 20°C', items: [{ id: '8', time: '15:00', title: '奇維塔韋基亞港報到', icon: '🚢', highlight: true }] },
            { date: '5/31', city: '巴塞隆納', weather: '多雲 20°C', hotel: HOTELS.barcelona, items: [{ id: '9', time: '06:30', title: '郵輪抵達巴塞隆納', icon: '🇪🇸' }] },
            { date: '6/1', city: '巴塞隆納', weather: '雨 18°C', hotel: HOTELS.barcelona, items: [{ id: '10', time: '14:45', title: '聖家堂 入場 (預約)', icon: '⛪', highlight: true }] },
            { date: '6/10', city: '曼谷 ➔ 台北', weather: '晴 30°C', items: [{ id: '11', time: '01:55', title: '曼谷起飛🏠', icon: '✈️' }, { id: '12', time: '08:30', title: '機場接送：桃機 ➔ 基隆', icon: '🚗', highlight: true }] }
        ];

        const FLIGHT_DATA = [
            { date: '2026.05.21', from: 'TPE', to: 'BKK', flight: 'CI 835', dep: '13:30', arr: '16:20', duration: '3:50h' },
            { date: '2026.05.22', from: 'FRA', to: 'FCO', flight: 'DE 4439', dep: '08:00', arr: '09:50', duration: '1:50h' },
            { date: '2026.06.10', from: 'BKK', to: 'TPE', flight: 'VZ 566', dep: '01:55', arr: '06:45', duration: '4:50h' }
        ];

        // --- 主應用程式 ---
        function App() {
            const [view, setView] = useState('home');
            const [showCalc, setShowCalc] = useState(false);
            const [calcVal, setCalcVal] = useState('');

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [view, showCalc]);

            const stickerStyle = "border-4 border-[#2D2D2D] sticker-shadow sticker-active transition-all";

            return (
                <div className="max-w-md mx-auto min-h-screen pb-32 text-[#2D2D2D]">
                    {view === 'home' && (
                        <div className="p-6 pt-20 animate-in fade-in">
                            <header className="text-center mb-12">
                                <h1 className="text-5xl font-black italic text-[#A67B5B] mb-4">Honeymoon Diary</h1>
                                <div className="bg-[#2D2D2D] text-white px-8 py-2 rounded-full inline-block border-4 border-white shadow-lg">
                                    <p className="text-[10px] tracking-widest font-black uppercase">Europe & Thailand • 2026</p>
                                </div>
                            </header>
                            <div className="grid grid-cols-2 gap-4">
                                <div onClick={() => setView('itinerary')} className={`col-span-2 h-44 bg-[#B5C0D0] rounded-[2.5rem] p-6 flex flex-col justify-center text-white ${stickerStyle}`}>
                                    <h2 className="text-3xl font-black">行程計畫</h2>
                                    <span className="text-[10px] opacity-70">ITINERARY & HOTELS</span>
                                </div>
                                <div onClick={() => setView('flights')} className={`h-40 bg-[#F9D949] rounded-3xl p-4 flex flex-col justify-between ${stickerStyle}`}>
                                    <i data-lucide="plane" size="32"></i>
                                    <div className="text-xl font-black">機票航班</div>
                                </div>
                                <div onClick={() => setView('budget')} className={`h-40 bg-[#CCD3CA] rounded-3xl p-4 flex flex-col justify-between ${stickerStyle}`}>
                                    <i data-lucide="credit-card" size="32"></i>
                                    <div className="text-xl font-black">蜜月帳本</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {view === 'itinerary' && (
                        <div className="p-6 pt-10 animate-in slide-in-from-right">
                            <button onClick={() => setView('home')} className="mb-6 flex items-center gap-2 opacity-50 font-black"><i data-lucide="home" size="18"></i> 返回</button>
                            <h2 className="text-3xl font-black mb-8 flex items-center gap-2"><i data-lucide="map"></i> 行程明細</h2>
                            {INITIAL_DAILY_PLANS.map((plan, i) => (
                                <div key={i} className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] p-6 mb-8 sticker-shadow">
                                    <div className="flex justify-between items-center mb-4 border-b-2 border-dashed border-gray-100 pb-2">
                                        <div className="bg-[#F9D949] px-3 py-1 rounded-full text-xs font-black">{plan.date}</div>
                                        <div className="font-black flex items-center gap-1"><i data-lucide="map-pin" size="14" className="text-red-500"></i> {plan.city}</div>
                                    </div>
                                    <div className="space-y-4">
                                        {plan.items.map(item => (
                                            <div key={item.id} className="flex gap-4 items-center">
                                                <div className="w-10 h-10 rounded-full border-2 border-[#2D2D2D] flex items-center justify-center bg-white text-xl">{item.icon}</div>
                                                <div>
                                                    <div className="text-[10px] opacity-40 font-black uppercase">{item.time}</div>
                                                    <div className={`font-black ${item.highlight ? 'text-red-500' : ''}`}>{item.title}</div>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {view === 'flights' && (
                        <div className="p-6 pt-10 animate-in slide-in-from-right">
                            <button onClick={() => setView('home')} className="mb-6 flex items-center gap-2 opacity-50 font-black"><i data-lucide="home" size="18"></i> 返回</button>
                            <h2 className="text-3xl font-black mb-8 flex items-center gap-2"><i data-lucide="plane"></i> 航班資訊</h2>
                            {FLIGHT_DATA.map((f, i) => (
                                <div key={i} className={`bg-white rounded-[2.5rem] mb-6 overflow-hidden ${stickerStyle}`}>
                                    <div className="p-4 bg-[#F9D949] border-b-4 border-dashed border-[#2D2D2D] flex justify-between font-black text-xs uppercase">
                                        <span>{f.date}</span>
                                        <span className="bg-[#2D2D2D] text-white px-2 py-0.5 rounded-full">{f.flight}</span>
                                    </div>
                                    <div className="p-8 flex justify-between items-center text-center">
                                        <div><div className="text-4xl font-black">{f.from}</div><div className="text-xl text-blue-600 font-black">{f.dep}</div></div>
                                        <i data-lucide="arrow-right" className="opacity-20"></i>
                                        <div><div className="text-4xl font-black">{f.to}</div><div className="text-xl text-red-500 font-black">{f.arr}</div></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {/* 選單與計算機 */}
                    <button onClick={() => setShowCalc(true)} className={`fixed bottom-24 right-6 w-16 h-16 rounded-full flex items-center justify-center bg-[#F9D949] z-50 ${stickerStyle}`}>
                        <i data-lucide="calculator" size="32"></i>
                    </button>

                    {showCalc && (
                        <div className="fixed inset-0 z-[100] bg-black/50 backdrop-blur-sm flex items-center justify-center p-6">
                            <div className="bg-[#F9D949] w-full max-w-xs rounded-[3rem] p-10 relative border-4 border-[#2D2D2D] shadow-[12px_12px_0px_0px_#2D2D2D]">
                                <button onClick={() => setShowCalc(false)} className="absolute right-6 top-6 bg-white p-2 rounded-full border-2 border-[#2D2D2D]"><i data-lucide="x" size="20"></i></button>
                                <h3 className="text-2xl font-black mb-6">匯率換算</h3>
                                <input type="number" className="w-full p-4 rounded-xl border-4 border-[#2D2D2D] text-3xl font-black outline-none mb-4" placeholder="€ Euro" 
                                    value={calcVal} onChange={e => setCalcVal(e.target.value)} />
                                <div className="bg-white p-6 rounded-xl border-4 border-[#2D2D2D] text-center">
                                    <div className="text-[10px] opacity-40 font-black uppercase mb-1">TWD Estimate</div>
                                    <div className="text-4xl font-black text-blue-600">NT$ {calcVal ? Math.round(calcVal * 35.5).toLocaleString() : 0}</div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* 底部簡易導航 */}
                    <div className="fixed bottom-6 left-0 right-0 flex justify-center z-40">
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-full px-8 py-3 flex gap-10 shadow-xl pointer-events-auto">
                            <button onClick={() => setView('home')} className="hover:scale-110 transition-transform"><i data-lucide="home"></i></button>
                            <button onClick={() => setView('itinerary')} className="hover:scale-110 transition-transform"><i data-lucide="map"></i></button>
                            <button onClick={() => setView('flights')} className="hover:scale-110 transition-transform"><i data-lucide="plane"></i></button>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
