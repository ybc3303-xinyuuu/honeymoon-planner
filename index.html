<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honeymoon Diary - Bill & Cindy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5E8DD; -webkit-tap-highlight-color: transparent; color: #2D2D2D; }
        .font-diary { font-family: 'Playfair Display', serif; font-style: italic; }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2D2D2D; border-radius: 10px; }
        .sticker-shadow { box-shadow: 8px 8px 0px 0px #2D2D2D; }
        .sticker-active:active { box-shadow: 2px 2px 0px 0px #2D2D2D; transform: translate(2px, 2px); }
        .timeline-line::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 4px; background: #2D2D2D; opacity: 0.1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [activeDate, setActiveDate] = useState('5/22');
            const [showAddModal, setShowAddModal] = useState(false);

            const CITY_INFO = {
                '5/21': { city: 'Taipei / Bangkok', weather: '☁️ 28°C' },
                '5/22': { city: 'Rome', weather: '☀️ 22°C' },
                '5/23': { city: 'Rome', weather: '☀️ 23°C' },
                '5/24': { city: 'Rome', weather: '⛅ 21°C' },
                '5/25': { city: 'Civitavecchia', weather: '⚓ 22°C' },
                '5/26': { city: 'Salerno', weather: '☀️ 24°C' },
                '5/27': { city: 'At Sea', weather: '🌊 23°C' },
                '5/28': { city: 'Cannes', weather: '☀️ 22°C' },
                '5/29': { city: 'Ibiza', weather: '☀️ 25°C' },
                '5/30': { city: 'Ibiza', weather: '⛅ 24°C' },
                '5/31': { city: 'Barcelona', weather: '☀️ 24°C' },
                '6/1': { city: 'Barcelona', weather: '☀️ 25°C' },
                '6/2': { city: 'Transit', weather: '✈️ --°C' },
                '6/3': { city: 'Bangkok', weather: '🌧️ 32°C' },
                '6/4': { city: 'Bangkok', weather: '☀️ 34°C' },
                '6/5': { city: 'Bangkok', weather: '☀️ 33°C' },
                '6/6': { city: 'Bangkok', weather: '⛅ 33°C' },
                '6/7': { city: 'Bangkok', weather: '☀️ 34°C' },
                '6/8': { city: 'Bangkok', weather: '☀️ 32°C' },
                '6/9': { city: 'Bangkok', weather: '⛅ 31°C' },
                '6/10': { city: 'Taipei', weather: '☁️ 27°C' }
            };

            const FLIGHT_DATA = [
                { date: '5/21', flight: 'CI835', route: 'TPE ➔ BKK', time: '13:30 - 16:20' },
                { date: '5/21', flight: 'DE2367', route: 'BKK ➔ FRA', time: '22:35 - 06:00+1' },
                { date: '5/22', flight: 'DE4439', route: 'FRA ➔ FCO', time: '08:00 - 09:50' },
                { date: '6/2', flight: 'DE4324', route: 'BCN ➔ FRA', time: '17:00 - 19:05' },
                { date: '6/2', flight: 'DE2366', route: 'FRA ➔ BKK', time: '20:15 - 12:35+1' },
                { date: '6/10', flight: 'VZ566', route: 'BKK ➔ TPE', time: '01:55 - 06:45' }
            ];

            const getHotelForDate = (dateStr) => {
                const d = new Date(`2026/${dateStr}`);
                if (d >= new Date('2026/5/22') && d <= new Date('2026/5/25')) 
                    return { name: 'Domus Appia 154', note: '✓ 有含早餐 | 入 15:00 退 10:00' };
                if (d >= new Date('2026/5/31') && d <= new Date('2026/6/2')) 
                    return { name: 'Aparthotel Silver', note: '✗ 不含早餐 | 入 15:00 退 11:00' };
                if (d >= new Date('2026/6/3') && d <= new Date('2026/6/8')) 
                    return { name: 'Gardina Asoke Hotel', note: '✗ 不含早餐 | 入 14:00 退 12:00' };
                if (d >= new Date('2026/6/8') && d <= new Date('2026/6/9')) 
                    return { name: 'Eastin Grand Hotel Phayathai', note: '✓ 有含早餐 | 入 14:00 退 12:00' };
                return null;
            };

            const [plans, setPlans] = useState([
                { date: '5/23', items: [{ id: 101, time: '10:30', title: '【已訂票】梵蒂岡博物館', icon: '🏛️', highlight: true }] },
                { date: '5/24', items: [{ id: 102, time: '12:10', title: '【已訂票】羅馬競技場', icon: '⚔️', highlight: true }] },
                { date: '5/25', items: [{ id: 999, time: '15:00', title: '🚢 報到登船 Check-in', icon: '⚓', highlight: true }, { id: 201, time: '20:00', title: '郵輪啟航：Civitavecchia', icon: '🚢', highlight: false }] },
                { date: '6/1', items: [{ id: 103, time: '14:45', title: '【已訂票】聖家堂 入場', icon: '⛪', highlight: true }] }
            ]);

            const [expenses, setExpenses] = useState([]);
            const [checklist, setChecklist] = useState([
                { id: 1, text: '護照與簽證', done: false }, { id: 2, text: '歐規轉接頭', done: false }
            ]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, activeDate, plans, checklist, expenses]);

            const Home = () => (
                <div className="p-6 pt-32 animate-in fade-in">
                    <div className="text-center mb-20">
                        <h1 className="text-6xl font-diary text-[#A67B5B] leading-none mb-4">Honeymoon Diary</h1>
                        <p className="text-2xl font-diary text-[#2D2D2D] opacity-40">Bill & Cindy</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div onClick={() => setView('itinerary')} className="col-span-2 h-40 bg-[#B5C0D0] rounded-[2.5rem] p-8 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between text-white">
                            <i data-lucide="calendar"></i>
                            <span className="text-4xl font-black italic">ITINERARY</span>
                        </div>
                        <div onClick={() => setView('flights')} className="h-40 bg-[#F9D949] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="plane"></i><span className="text-xl font-black italic">FLIGHTS</span></div>
                        <div onClick={() => setView('budget')} className="h-40 bg-[#CCD3CA] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="wallet"></i><span className="text-xl font-black italic">BUDGET</span></div>
                        <div onClick={() => setView('packing')} className="col-span-2 h-20 bg-white rounded-2xl p-6 border-4 border-[#2D2D2D] sticker-shadow flex items-center justify-between sticker-active">
                            <div className="flex items-center gap-4"><i data-lucide="list-checks"></i><span className="font-black italic text-xl">PACKING LIST</span></div>
                            <i data-lucide="chevron-right"></i>
                        </div>
                    </div>
                </div>
            );

            const Itinerary = () => {
                const dates = ["5/21", "5/22", "5/23", "5/24", "5/25", "5/26", "5/27", "5/28", "5/29", "5/30", "5/31", "6/1", "6/2", "6/3", "6/4", "6/5", "6/6", "6/7", "6/8", "6/9", "6/10"];
                const info = CITY_INFO[activeDate] || { city: 'Exploring', weather: '--' };
                const hotel = getHotelForDate(activeDate);
                const currentItems = plans.find(p => p.date === activeDate)?.items || [];
                const dayFlights = FLIGHT_DATA.filter(f => f.date === activeDate);
                
                return (
                    <div className="animate-in slide-in-from-right pb-40">
                        <div className="bg-white sticky top-0 z-40 border-b-4 border-[#2D2D2D] p-6">
                            <div className="flex justify-between items-start mb-6">
                                <button onClick={() => setView('home')}><i data-lucide="chevron-left"></i></button>
                                <div className="text-right">
                                    <div className="font-black text-xs opacity-40 uppercase">{info.city}</div>
                                    <div className="font-black text-xl italic">{info.weather}</div>
                                </div>
                            </div>
                            <div className="overflow-x-auto custom-scrollbar pb-4 flex gap-4">
                                {dates.map(d => (
                                    <button key={d} onClick={() => setActiveDate(d)} className={`flex-shrink-0 w-14 py-4 rounded-2xl border-4 border-[#2D2D2D] font-black ${activeDate === d ? 'bg-[#2D2D2D] text-white sticker-shadow' : 'bg-white opacity-40'}`}>{d}</button>
                                ))}
                            </div>
                        </div>
                        <div className="p-6 timeline-line relative space-y-6">
                            {dayFlights.map((f, idx) => (
                                <div key={`f-${idx}`} className="flex gap-6 relative z-10">
                                    <div className="w-10 h-10 rounded-full border-4 border-[#2D2D2D] bg-sky-400 flex items-center justify-center shrink-0 sticker-shadow text-white"><i data-lucide="plane" size={18}></i></div>
                                    <div className="flex-1 bg-sky-50 border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black opacity-40 uppercase">Flight Info</span>
                                            <span className="text-[10px] font-black opacity-40">{f.time}</span>
                                        </div>
                                        <div className="font-black text-lg">{f.flight} | {f.route}</div>
                                    </div>
                                </div>
                            ))}
                            {hotel && (
                                <div className="flex gap-6 relative z-10">
                                    <div className="w-10 h-10 rounded-full border-4 border-[#2D2D2D] bg-[#F9D949] flex items-center justify-center shrink-0 sticker-shadow">🏨</div>
                                    <div className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow">
                                        <div className="font-black text-lg underline decoration-dashed">{hotel.name}</div>
                                        <div className="text-[10px] font-black mt-1 opacity-60">{hotel.note}</div>
                                    </div>
                                </div>
                            )}
                            {currentItems.map((item) => (
                                <div key={item.id} className="flex gap-6 relative z-10 group">
                                    <div className={`w-10 h-10 rounded-full border-4 border-[#2D2D2D] flex items-center justify-center shrink-0 sticker-shadow ${item.highlight ? 'bg-red-500 text-white' : 'bg-white'}`}>{item.icon}</div>
                                    <div className={`flex-1 bg-white border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow relative ${item.highlight ? 'border-red-500' : ''}`}>
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black opacity-30">{item.time}</span>
                                            <button onClick={()=>setPlans(plans.map(p=>p.date===activeDate?{...p,items:p.items.filter(i=>i.id!==item.id)}:p))} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2" size={14}></i></button>
                                        </div>
                                        <div className={`text-lg font-black ${item.highlight ? 'text-red-500' : ''}`}>{item.title}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-0 right-0 px-8 z-40 max-w-md mx-auto">
                            <button onClick={() => setShowAddModal(true)} className="w-full py-5 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-full font-black text-2xl sticker-shadow sticker-active">+ ADD PLAN</button>
                        </div>
                    </div>
                );
            };

            const Flights = () => {
                const flights = [
                    { date: '21.05', day: 'Wed', flight: 'CI835', from: 'TPE (T2)', to: 'BKK (T1)', time: '13:30 - 16:20', dur: '3:50h', trans: '6h 15m' },
                    { date: '21.05', day: 'Wed', flight: 'DE2367', from: 'BKK (T1)', to: 'FRA (T1)', time: '22:35 - 06:00+1', dur: '12:25h', trans: '2h 00m' },
                    { date: '22.05', day: 'Thu', flight: 'DE4439', from: 'FRA (T1)', to: 'FCO (T3)', time: '08:00 - 09:50', dur: '1:50h' },
                    { date: '02.06', day: 'Tue', flight: 'DE4324', from: 'BCN (T1)', to: 'FRA (T1)', time: '17:00 - 19:05', dur: '2:05h', trans: '1h 10m' },
                    { date: '02.06', day: 'Tue', flight: 'DE2366', from: 'FRA (T1)', to: 'BKK (T1)', time: '20:15 - 12:35+1', dur: '11:20h' },
                    { date: '10.06', day: 'Wed', flight: 'VZ566', from: 'BKK (T1)', to: 'TPE (T1)', time: '01:55 - 06:45', dur: '4:50h', isLast: true }
                ];
                return (
                    <div className="p-6 pt-10 animate-in slide-in-from-right pb-32 text-black">
                        <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-5xl font-black italic mb-10 text-center">Flights</h2>
                        {flights.map((f, i) => (
                            <div key={i} className="mb-10">
                                <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] overflow-hidden sticker-shadow">
                                    <div className="bg-[#F9D949] p-4 font-black border-b-4 border-[#2D2D2D] flex justify-between px-8 italic">
                                        <span>{f.date} ({f.day})</span>
                                        <a href={`https://www.google.com/search?q=${f.flight}`} target="_blank" className="underline decoration-2">{f.flight}</a>
                                    </div>
                                    <div className="p-8 text-center">
                                        <div className="text-2xl font-black mb-1">{f.from} ➔ {f.to}</div>
                                        <div className="text-2xl font-black text-red-500 italic mb-3">{f.time} <span className="text-[10px] text-gray-400">({f.dur})</span></div>
                                        <div className="inline-flex items-center gap-3 bg-[#F5E8DD] border-2 border-[#2D2D2D] rounded-full px-5 py-2">
                                            <i data-lucide="briefcase" size={14}></i>
                                            <span className="text-xs font-black">
                                                Checked <span className="text-red-500">{f.isLast ? '30kg' : '20kg'}</span> / Carry-on <span className="text-red-500">{f.isLast ? '7kg' : '8kg'}</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                {f.trans && <div className="flex justify-center mt-4"><div className="bg-[#2D2D2D] text-[#F9D949] px-4 py-1 rounded-full text-[10px] font-black sticker-shadow italic">Transfer: {f.trans}</div></div>}
                            </div>
                        ))}
                    </div>
                );
            };

            const Budget = () => {
                const [val, setVal] = useState('');
                const [title, setTitle] = useState('');
                const [curr, setCurr] = useState('EUR');
                const rate = curr === 'EUR' ? 35.5 : 0.92;
                const total = expenses.reduce((s, e) => s + e.twd, 0);
                return (
                    <div className="p-6 animate-in slide-in-from-right pb-44">
                        <button onClick={() => setView('home')} className="mb-6"><i data-lucide="arrow-left"></i></button>
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] p-8 mb-8 sticker-shadow">
                            <div className="flex gap-2 mb-4">
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Item..." className="flex-1 text-xl font-black outline-none border-b-2 border-dashed" />
                                <button onClick={()=>setCurr(curr==='EUR'?'THB':'EUR')} className="bg-black text-white px-3 rounded-full text-[10px]">{curr}</button>
                            </div>
                            <input type="number" value={val} onChange={e=>setVal(e.target.value)} className="w-full text-5xl font-black outline-none italic" placeholder="0" />
                            <div className="text-xl text-blue-600 font-black mt-1">≈ NT$ {Math.round(val * rate).toLocaleString()}</div>
                            <button onClick={() => {
                                if(!val || !title) return;
                                setExpenses([{ id: Date.now(), title, amount: val, curr, twd: Math.round(val*rate) }, ...expenses]);
                                setVal(''); setTitle('');
                            }} className="w-full mt-6 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-2xl font-black sticker-active italic">ADD RECORD</button>
                        </div>
                        <div className="space-y-4">
                            {expenses.map(e => (
                                <div key={e.id} className="bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex justify-between items-center sticker-shadow">
                                    <div className="font-black">{e.title}</div>
                                    <div className="flex items-center gap-4 text-right">
                                        <div className="font-black text-red-500">{e.curr} {e.amount}</div>
                                        <button onClick={()=>setExpenses(expenses.filter(i=>i.id!==e.id))} className="text-gray-200 hover:text-red-500"><i data-lucide="trash-2" size={16}></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-0 right-0 px-8 max-w-md mx-auto"><div className="bg-[#2D2D2D] text-[#F9D949] p-4 rounded-3xl border-4 border-white flex justify-between items-center sticker-shadow"><span className="text-[10px] font-black italic">TOTAL SPENT</span><span className="text-lg font-black underline">NT$ {total.toLocaleString()}</span></div></div>
                    </div>
                );
            };

            const Packing = () => {
                const [text, setText] = useState('');
                return (
                    <div className="p-6 pt-10 animate-in slide-in-from-right pb-32">
                        <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-5xl font-black italic mb-8">Packing</h2>
                        <div className="flex gap-4 mb-8 bg-white border-4 border-[#2D2D2D] rounded-2xl p-2 sticker-shadow">
                            <input value={text} onChange={e=>setText(e.target.value)} placeholder="Add item..." className="flex-1 p-3 font-black outline-none bg-transparent" />
                            <button onClick={()=>{ if(text) {setChecklist([...checklist, {id:Date.now(), text, done:false}]); setText('');} }} className="bg-[#2D2D2D] text-white px-6 rounded-xl font-black">ADD</button>
                        </div>
                        <div className="space-y-4">
                            {checklist.map(item => (
                                <div key={item.id} className="flex gap-4 items-center group">
                                    <div onClick={() => setChecklist(checklist.map(i => i.id === item.id ? {...i, done: !i.done} : i))} className={`flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex items-center gap-4 sticker-shadow ${item.done ? 'opacity-30' : ''}`}>
                                        <div className={`w-6 h-6 border-2 border-black rounded ${item.done ? 'bg-black' : ''}`}></div>
                                        <span className={`text-lg font-black ${item.done ? 'line-through' : ''}`}>{item.text}</span>
                                    </div>
                                    <button onClick={() => setChecklist(checklist.filter(i => i.id !== item.id))} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const AddModal = () => {
                const [time, setTime] = useState('12:00');
                const [title, setTitle] = useState('');
                const [emoji, setEmoji] = useState('📍');
                const [isRed, setIsRed] = useState(false);
                return (
                    <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-6">
                        <div className="bg-[#F5E8DD] w-full max-w-xs rounded-[3rem] border-4 border-[#2D2D2D] p-10 sticker-shadow text-black">
                            <h3 className="text-3xl font-black mb-8 italic text-center underline uppercase">NEW PLAN</h3>
                            <div className="space-y-6">
                                <div className="flex gap-2">
                                    <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black" />
                                    <input type="text" value={emoji} onChange={e=>setEmoji(e.target.value)} className="w-16 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 text-center font-black" />
                                </div>
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="Activity..." className="w-full bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black" />
                                <label className="flex items-center gap-2 font-black italic"><input type="checkbox" checked={isRed} onChange={e=>setIsRed(e.target.checked)} className="w-5 h-5 border-2 border-black" /> Important</label>
                                <div className="flex gap-4">
                                    <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 bg-white border-4 border-[#2D2D2D] rounded-xl font-black">BACK</button>
                                    <button onClick={()=>{
                                        const newItem = { id: Date.now(), time, title, icon: emoji, highlight: isRed };
                                        const exists = plans.find(p=>p.date===activeDate);
                                        if(exists) setPlans(plans.map(p=>p.date===activeDate ? {...p, items: [...p.items, newItem]} : p));
                                        else setPlans([...plans, {date: activeDate, items:[newItem]}]);
                                        setShowAddModal(false);
                                    }} className="flex-1 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-xl font-black italic">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative">
                    {view === 'home' && <Home />}
                    {view === 'itinerary' && <Itinerary />}
                    {view === 'flights' && <Flights />}
                    {view === 'budget' && <Budget />}
                    {view === 'packing' && <Packing />}
                    <nav className="fixed bottom-6 left-0 right-0 px-6 z-40 max-w-md mx-auto">
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-full h-16 flex items-center justify-around sticker-shadow">
                            <button onClick={() => setView('home')}><i data-lucide="home"></i></button>
                            <button onClick={() => setView('itinerary')}><i data-lucide="map-pin"></i></button>
                            <button onClick={() => setView('flights')}><i data-lucide="plane"></i></button>
                            <button onClick={() => setView('budget')}><i data-lucide="wallet"></i></button>
                        </div>
                    </nav>
                    {showAddModal && <AddModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
