<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honeymoon 2026 | Ultimate Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5E8DD; -webkit-tap-highlight-color: transparent; overflow-x: hidden; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .sticker-shadow { box-shadow: 8px 8px 0px 0px #2D2D2D; }
        .sticker-active:active { box-shadow: 2px 2px 0px 0px #2D2D2D; transform: translate(2px, 2px); }
        .timeline-line::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 4px; background: #2D2D2D; opacity: 0.1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [activeDate, setActiveDate] = useState('5/22');
            const [showCalc, setShowCalc] = useState(false);
            const [showAddModal, setShowAddModal] = useState(false);

            // --- 城市與天氣對照表 ---
            const CITY_DATA = {
                '5/21': { city: 'Taipei', weather: '28°C ☁️' },
                '5/22': { city: 'Rome', weather: '22°C ☀️' },
                '5/23': { city: 'Rome', weather: '24°C ☀️' },
                '5/24': { city: 'Rome', weather: '23°C ☀️' },
                '5/25': { city: 'Cruise (Rome)', weather: '21°C 🌊' },
                '5/31': { city: 'Barcelona', weather: '20°C ☀️' },
                '6/1': { city: 'Barcelona', weather: '22°C ☀️' },
                '6/2': { city: 'Barcelona', weather: '23°C ☀️' },
                '6/3': { city: 'Bangkok', weather: '34°C ⛈️' },
                '6/5': { city: 'Bangkok', weather: '33°C ☀️' },
                '6/10': { city: 'Taipei', weather: '29°C ☁️' }
            };

            // --- 1. 行程狀態 ---
            const [plans, setPlans] = useState([
                { date: '5/23', items: [{ id: 1, time: '10:30', title: '梵蒂岡博物館', icon: '🏛️', highlight: true }] },
                { date: '5/24', items: [{ id: 2, time: '12:10', title: '羅馬競技場', icon: '⚔️', highlight: true }] },
                { date: '6/1', items: [{ id: 3, time: '14:45', title: '聖家堂 入場', icon: '⛪', highlight: true }, { id: 4, time: '15:30', title: '聖家堂 上塔', icon: '🗼' }] }
            ]);

            // --- 2. 帳本狀態 ---
            const [expenses, setExpenses] = useState([]);
            const totalTWD = expenses.reduce((sum, exp) => sum + exp.twd, 0);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, showCalc, showAddModal]);

            // --- 組件：首頁 ---
            const HomeView = () => (
                <div className="p-6 pt-20 animate-in fade-in">
                    <h1 className="text-6xl font-black italic text-[#A67B5B] text-center mb-2">Honeymoon</h1>
                    <p className="text-center text-xs tracking-[0.4em] font-black opacity-30 mb-16 uppercase">2026 Adventure</p>
                    <div className="grid grid-cols-2 gap-4">
                        <div onClick={() => setView('itinerary')} className="col-span-2 h-44 bg-[#B5C0D0] rounded-[2.5rem] p-8 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-end text-white"><span className="text-4xl font-black italic">ITINERARY</span></div>
                        <div onClick={() => setView('flights')} className="h-44 bg-[#F9D949] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="plane"></i><span className="text-xl font-black italic">FLIGHTS</span></div>
                        <div onClick={() => setView('budget')} className="h-44 bg-[#CCD3CA] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="wallet"></i><span className="text-xl font-black italic">BUDGET</span></div>
                    </div>
                </div>
            );

            // --- 組件：行程計畫 ---
            const ItineraryView = () => {
                const dates = ["5/21", "5/22", "5/23", "5/24", "5/25", "5/26", "5/27", "5/28", "5/29", "5/30", "5/31", "6/1", "6/2", "6/3", "6/4", "6/5", "6/6", "6/7", "6/8", "6/9", "6/10"];
                const dayInfo = CITY_DATA[activeDate] || { city: 'Traveling', weather: '--' };
                const currentMonth = activeDate.startsWith('5') ? 'MAY' : 'JUNE';

                return (
                    <div className="animate-in slide-in-from-right pb-40">
                        <div className="bg-white sticky top-0 z-40 border-b-4 border-[#2D2D2D] p-6">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setView('home')} className="bg-white border-2 border-[#2D2D2D] p-2 rounded-full"><i data-lucide="chevron-left"></i></button>
                                <div className="text-right">
                                    <div className="text-xs font-black opacity-30 tracking-widest">{currentMonth} 2026</div>
                                    <div className="text-2xl font-black italic">{dayInfo.city}</div>
                                    <div className="text-xs font-bold text-blue-500">{dayInfo.weather}</div>
                                </div>
                            </div>
                            <div className="flex gap-4 overflow-x-auto no-scrollbar pb-2 cursor-grab active:cursor-grabbing">
                                {dates.map(d => (
                                    <button key={d} onClick={() => setActiveDate(d)} className={`flex-shrink-0 w-14 py-4 rounded-2xl border-4 border-[#2D2D2D] font-black transition-all ${activeDate === d ? 'bg-[#2D2D2D] text-white sticker-shadow' : 'bg-white opacity-40'}`}>
                                        <div className="text-[10px] mb-1">{d.split('/')[0] === '5' ? 'May' : 'Jun'}</div>
                                        <div className="text-lg">{d.split('/')[1]}</div>
                                    </button>
                                ))}
                            </div>
                        </div>

                        <div className="p-6 timeline-line relative space-y-8">
                            {plans.find(p => p.date === activeDate)?.items.map(item => (
                                <div key={item.id} className="flex gap-6 relative z-10 group">
                                    <div className={`w-12 h-12 rounded-full border-4 border-[#2D2D2D] flex items-center justify-center shrink-0 sticker-shadow ${item.highlight ? 'bg-orange-400 text-white' : 'bg-white text-2xl'}`}>{item.icon}</div>
                                    <div className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow relative">
                                        <div className="text-xs font-black opacity-30">{item.time}</div>
                                        <div className="text-xl font-black italic">{item.title}</div>
                                        <button onClick={() => {
                                            const newPlans = plans.map(p => p.date === activeDate ? {...p, items: p.items.filter(i => i.id !== item.id)} : p);
                                            setPlans(newPlans);
                                        }} className="absolute -top-2 -right-2 bg-red-500 text-white w-7 h-7 rounded-full border-2 border-[#2D2D2D] hidden group-hover:flex items-center justify-center"><i data-lucide="trash-2" size={14}></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="fixed bottom-24 left-0 right-0 px-8 z-40 max-w-md mx-auto">
                            <button onClick={() => setShowAddModal(true)} className="w-full py-5 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-full font-black text-2xl sticker-shadow sticker-active italic">+ ADD PLAN</button>
                        </div>
                    </div>
                );
            };

            // --- 組件：航班資訊 (航廈與字體加大) ---
            const FlightsView = () => (
                <div className="p-6 pt-10 animate-in slide-in-from-right pb-32">
                    <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                    <h2 className="text-5xl font-black italic mb-10">Tickets</h2>
                    {[
                        { date: '21.05', from: 'TPE', to: 'BKK', flight: 'CI 835', time: '13:30 - 16:20', dur: '3:50h', term: 'T2 / BKK', transit: 'Layover: 6h 15m' },
                        { date: '21.05', from: 'BKK', to: 'FRA', flight: 'DE 2367', time: '22:35 - 06:00+1', dur: '12:25h', term: 'BKK / T1', transit: 'Layover: 2h 00m' },
                        { date: '22.05', from: 'FRA', to: 'FCO', flight: 'DE 4439', time: '08:00 - 09:50', dur: '1:50h', term: 'T1 / T3' },
                        { date: '02.06', from: 'BCN', to: 'FRA', flight: 'DE 4324', time: '17:00 - 19:05', dur: '2:05h', term: 'T1 / T1', transit: 'Layover: 1h 10m' },
                        { date: '10.06', from: 'BKK', to: 'TPE', flight: 'VZ 566', time: '01:55 - 06:45', dur: '4:50h', term: 'BKK / T1' }
                    ].map((f, i) => (
                        <div key={i} className="mb-8">
                            <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] overflow-hidden sticker-shadow">
                                <div className="bg-[#F9D949] p-4 flex justify-between items-center border-b-4 border-[#2D2D2D]">
                                    <span className="font-black">{f.date}</span>
                                    <a href={`https://www.google.com/search?q=${f.flight}`} target="_blank" className="font-black underline italic text-xl tracking-tighter">{f.flight}</a>
                                </div>
                                <div className="p-6">
                                    <div className="text-3xl font-black mb-2">{f.from} ➔ {f.to}</div>
                                    <div className="text-2xl font-black text-red-500 mb-4">{f.time}</div>
                                    <div className="flex justify-between items-end">
                                        <div className="text-lg font-black bg-gray-100 px-3 py-1 rounded-xl">TERM: {f.term}</div>
                                        <div className="text-lg font-black opacity-40 italic">{f.dur}</div>
                                    </div>
                                </div>
                            </div>
                            {f.transit && <div className="flex justify-center my-4"><div className="bg-[#2D2D2D] text-white px-5 py-1 rounded-full text-xs font-black italic sticker-shadow tracking-widest">{f.transit}</div></div>}
                        </div>
                    ))}
                </div>
            );

            // --- 組件：帳本 (刪除與統計) ---
            const BudgetView = () => {
                const [val, setVal] = useState('');
                const [curr, setCurr] = useState('EUR');
                return (
                    <div className="p-6 animate-in slide-in-from-right pb-40">
                        <button onClick={() => setView('home')} className="mb-6"><i data-lucide="arrow-left"></i></button>
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-[3rem] p-10 mb-8 sticker-shadow">
                            <div className="flex justify-between mb-4">
                                <span className="font-black opacity-30">QUICK RECORD</span>
                                <button onClick={() => setCurr(curr === 'EUR' ? 'THB' : 'EUR')} className="bg-[#2D2D2D] text-white px-4 py-1 rounded-full text-xs font-black sticker-shadow">➔ {curr === 'EUR' ? '泰銖' : '歐元'}</button>
                            </div>
                            <input type="number" value={val} onChange={e => setVal(e.target.value)} className="w-full text-7xl font-black outline-none italic" placeholder="0" />
                            <div className="text-3xl text-blue-600 font-black mt-2">≈ NT$ {val ? Math.round(val * (curr === 'EUR' ? 35.5 : 0.92)).toLocaleString() : 0}</div>
                        </div>
                        <button onClick={() => {
                            if (!val) return;
                            const title = prompt("品項名稱?");
                            const amount = parseFloat(val);
                            const twd = Math.round(amount * (curr === 'EUR' ? 35.5 : 0.92));
                            setExpenses([{ id: Date.now(), title: title || '未分類', amount, curr, twd, time: 'NOW' }, ...expenses]);
                            setVal('');
                        }} className="w-full py-6 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-[2rem] text-3xl font-black sticker-shadow sticker-active italic mb-12">CONFIRM</button>
                        
                        <div className="space-y-4">
                            <h3 className="font-black text-xs opacity-30 px-2 tracking-widest">HISTORY</h3>
                            {expenses.map(e => (
                                <div key={e.id} className="bg-white border-4 border-[#2D2D2D] rounded-3xl p-5 flex justify-between items-center sticker-shadow group">
                                    <div>
                                        <div className="font-black text-xl italic">{e.title}</div>
                                        <div className="text-[10px] font-bold opacity-30">{e.time}</div>
                                    </div>
                                    <div className="flex items-center gap-4">
                                        <div className="text-right">
                                            <div className="text-xl font-black text-red-500">{e.curr} {e.amount}</div>
                                            <div className="text-xs font-bold opacity-30">NT$ {e.twd}</div>
                                        </div>
                                        <button onClick={() => setExpenses(expenses.filter(i => i.id !== e.id))} className="text-gray-300 hover:text-red-500 transition-colors"><i data-lucide="trash-2" size={18}></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-0 right-0 px-8 max-w-md mx-auto">
                             <div className="bg-[#2D2D2D] text-white p-5 rounded-3xl sticker-shadow border-4 border-white flex justify-between items-center">
                                <span className="font-black italic">TOTAL SPENT</span>
                                <span className="text-2xl font-black text-[#F9D949]">NT$ {totalTWD.toLocaleString()}</span>
                             </div>
                        </div>
                    </div>
                );
            };

            // --- 彈窗組件：新增行程 ---
            const AddModal = () => {
                const [time, setTime] = useState('12:00');
                const [title, setTitle] = useState('');
                const [icon, setIcon] = useState('📍');
                const icons = ['🏛️', '⚔️', '⛪', '🗼', '🍽️', '🛍️', '✈️', '🏨', '📍'];

                return (
                    <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-6">
                        <div className="bg-[#F5E8DD] w-full max-w-xs rounded-[3rem] border-4 border-[#2D2D2D] p-10 sticker-shadow animate-in zoom-in">
                            <h3 className="text-3xl font-black mb-8 italic">Add Plan</h3>
                            <div className="space-y-6">
                                <div>
                                    <label className="text-[10px] font-black opacity-30 uppercase ml-2">Time</label>
                                    <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="w-full bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black outline-none" />
                                </div>
                                <div>
                                    <label className="text-[10px] font-black opacity-30 uppercase ml-2">Activity</label>
                                    <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="名稱..." className="w-full bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black outline-none" />
                                </div>
                                <div className="flex gap-2 overflow-x-auto no-scrollbar pb-2">
                                    {icons.map(i => (
                                        <button key={i} onClick={()=>setIcon(i)} className={`w-10 h-10 shrink-0 border-2 border-[#2D2D2D] rounded-full bg-white text-lg ${icon === i ? 'bg-[#F9D949] ring-4 ring-[#F9D949]/30' : ''}`}>{i}</button>
                                    ))}
                                </div>
                                <div className="flex gap-4">
                                    <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 bg-white border-4 border-[#2D2D2D] rounded-2xl font-black sticker-shadow">CANCEL</button>
                                    <button onClick={()=>{
                                        const newPlans = [...plans];
                                        const idx = newPlans.findIndex(p => p.date === activeDate);
                                        const newItem = { id: Date.now(), time, title: title || 'New Plan', icon };
                                        if (idx > -1) newPlans[idx].items.push(newItem);
                                        else newPlans.push({ date: activeDate, items: [newItem] });
                                        setPlans(newPlans);
                                        setShowAddModal(false);
                                    }} className="flex-1 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-2xl font-black sticker-shadow">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative">
                    {view === 'home' && <HomeView />}
                    {view === 'itinerary' && <ItineraryView />}
                    {view === 'flights' && <FlightsView />}
                    {view === 'budget' && <BudgetView />}
                    
                    {/* 全域懸浮計算機 */}
                    <button onClick={() => setShowCalc(true)} className="fixed bottom-28 right-6 w-14 h-14 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-full sticker-shadow z-50 flex items-center justify-center sticker-active"><i data-lucide="calculator"></i></button>

                    <nav className="fixed bottom-6 left-0 right-0 px-6 z-40 max-w-md mx-auto">
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-full h-16 flex items-center justify-around sticker-shadow">
                            <button onClick={() => setView('home')} className={view === 'home' ? 'text-[#A67B5B]' : 'opacity-20'}><i data-lucide="home"></i></button>
                            <button onClick={() => setView('itinerary')} className={view === 'itinerary' ? 'text-[#A67B5B]' : 'opacity-20'}><i data-lucide="map-pin"></i></button>
                            <button onClick={() => setView('flights')} className={view === 'flights' ? 'text-[#A67B5B]' : 'opacity-20'}><i data-lucide="plane"></i></button>
                            <button onClick={() => setView('budget')} className={view === 'budget' ? 'text-[#A67B5B]' : 'opacity-20'}><i data-lucide="wallet"></i></button>
                        </div>
                    </nav>

                    {showAddModal && <AddModal />}
                    {showCalc && (
                        <div className="fixed inset-0 z-[100] bg-black/70 backdrop-blur-md flex items-center justify-center p-6">
                            <div className="bg-[#F9D949] w-full max-w-xs rounded-[3rem] border-4 border-[#2D2D2D] p-10 sticker-shadow animate-in zoom-in">
                                <button onClick={()=>setShowCalc(false)} className="absolute right-6 top-6"><i data-lucide="x"></i></button>
                                <h3 className="text-3xl font-black mb-8 italic">Exchange</h3>
                                <input type="number" autoFocus className="w-full text-5xl p-5 rounded-2xl border-4 border-[#2D2D2D] font-black outline-none mb-6" placeholder="€" onChange={(e)=>document.getElementById('res').innerText = 'NT$ ' + Math.round(e.target.value * 35.5).toLocaleString()} />
                                <div id="res" className="text-4xl font-black text-blue-600 bg-white p-6 rounded-2xl border-4 border-[#2D2D2D] text-center">NT$ 0</div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
