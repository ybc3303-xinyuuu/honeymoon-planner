<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honeymoon - Bill & Cindy</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@1,700;1,900&family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5E8DD; color: #2D2D2D; margin: 0; -webkit-tap-highlight-color: transparent; }
        .font-diary { font-family: 'Playfair Display', serif; font-style: italic; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2D2D2D; border-radius: 10px; }
        .sticker-shadow { box-shadow: 8px 8px 0px 0px #2D2D2D; }
        .sticker-active:active { box-shadow: 2px 2px 0px 0px #2D2D2D; transform: translate(2px, 2px); }
        .timeline-line::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 4px; background: #2D2D2D; opacity: 0.1; }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        const firebaseConfig = {
            apiKey: "AIzaSyDtVpJ7_iqayPNGEa_68HcwJlvB0lAyAZA",
            authDomain: "honeymoon-planner-31db3.firebaseapp.com",
            databaseURL: "https://honeymoon-planner-31db3-default-rtdb.firebaseio.com/",
            projectId: "honeymoon-planner-31db3",
            storageBucket: "honeymoon-planner-31db3.firebasestorage.app",
            messagingSenderId: "255565061415",
            appId: "1:255565061415:web:7c6aa3469483bc26449d02"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const dbRef = db.ref('planner_v5_data'); 
        const { useState, useEffect } = React;

        const CITY_INFO = {
            '5/21': 'Bangkok', '5/22': 'Rome', '5/23': 'Rome', '5/24': 'Rome', '5/25': 'Civitavecchia',
            '5/26': 'Salerno', '5/27': 'Sailing', '5/28': 'Cannes', '5/29': 'Ibiza', '5/30': 'Ibiza',
            '5/31': 'Barcelona', '6/1': 'Barcelona', '6/2': 'Frankfurt', '6/3': 'Bangkok', '6/4': 'Bangkok',
            '6/5': 'Bangkok', '6/6': 'Bangkok', '6/7': 'Bangkok', '6/8': 'Bangkok', '6/9': 'Bangkok', '6/10': 'Taipei'
        };

        const getHotel = (dateStr) => {
            const [m, d] = dateStr.split('/').map(Number);
            if (m === 5) {
                if (d >= 22 && d <= 24) return { name: 'Domus Appia 154', note: '✓ 含早餐 | 入 15:00 退 10:00', link: 'https://www.google.com/maps/search/Domus+Appia+154+Rome' };
                if (d >= 31) return { name: 'Aparthotel Silver', note: '✗ 不含早餐 | 入 15:00 退 11:00', link: 'https://www.google.com/maps/search/Aparthotel+Silver+Barcelona' };
            }
            if (m === 6) {
                if (d <= 2) return { name: 'Aparthotel Silver', note: '✗ 不含早餐', link: 'https://www.google.com/maps/search/Aparthotel+Silver+Barcelona' };
                if (d >= 3 && d <= 7) return { name: 'Gardina Asoke Hotel', note: '✗ 不含早餐 | 入 14:00 退 12:00', link: 'https://www.google.com/maps/search/Gardina+Asoke+Hotel+Bangkok' };
                if (d >= 8 && d <= 9) return { name: 'Eastin Grand Hotel Phayathai', note: '✓ 含早餐 | 入 14:00 退 12:00', link: 'https://www.google.com/maps/search/Eastin+Grand+Hotel+Phayathai' };
            }
            return null;
        };

        const INITIAL_PLANS = [
            { date: '5/21', items: [{ id: 'f1', time: '13:30', title: 'CI835 | TPE ➔ BKK', icon: '✈️' }, { id: 'f2', time: '22:35', title: 'DE2367 | BKK ➔ FRA', icon: '✈️' }] },
            { date: '5/22', items: [{ id: 'f3', time: '08:00', title: 'DE4439 | FRA ➔ FCO', icon: '✈️' }] },
            { date: '5/23', items: [{ id: 't1', time: '10:30', title: '【已預訂】梵蒂岡博物館', icon: '🏛️', highlight: true }] },
            { date: '5/24', items: [{ id: 't2', time: '12:10', title: '【已預訂】羅馬競技場', icon: '⚔️', highlight: true }] },
            { date: '5/25', items: [{ id: 's1', time: '15:00', title: '🚢 郵輪報到登船', icon: '⚓', highlight: true }, { id: 's2', time: '20:00', title: '郵輪啟航 (Civitavecchia)', icon: '🚢' }] },
            { date: '5/26', items: [{ id: 's3', time: '08:00', title: '抵達 Salerno (阿瑪菲海岸)', icon: '🍋' }, { id: 's4', time: '19:00', title: '郵輪啟航 (Salerno)', icon: '🚢' }] },
            { date: '5/28', items: [{ id: 's5', time: '08:00', title: '抵達 Cannes, France', icon: '🇫🇷' }, { id: 's6', time: '17:00', title: '郵輪啟航 (Cannes)', icon: '🚢' }] },
            { date: '5/29', items: [{ id: 's8', time: '19:00', title: '抵達 Ibiza', icon: '🍒' }] },
            { date: '5/30', items: [{ id: 's9', time: '17:00', title: '郵輪啟航 (Ibiza)', icon: '🚢' }] },
            { date: '5/31', items: [{ id: 's7', time: '06:30', title: '抵達 Barcelona (下船)', icon: '🥘' }] },
            { date: '6/1', items: [{ id: 't3', time: '14:45', title: '【已預訂】聖家堂 入場', icon: '⛪', highlight: true }] },
            { date: '6/2', items: [{ id: 'f4', time: '17:00', title: 'DE4324 | BCN ➔ FRA', icon: '✈️' }, { id: 'f5', time: '20:15', title: 'DE2366 | FRA ➔ BKK', icon: '✈️' }] },
            { date: '6/10', items: [{ id: 'f6', time: '01:55', title: 'VZ566 | BKK ➔ TPE', icon: '✈️' }] }
        ];

        function App() {
            const [view, setView] = useState('home');
            const [activeDate, setActiveDate] = useState('5/21');
            const [showAddModal, setShowAddModal] = useState(false);
            const [data, setData] = useState(null);
            const [weather, setWeather] = useState({ temp: '--', icon: 'cloud' });

            useEffect(() => {
                dbRef.on('value', (snapshot) => {
                    const cloudData = snapshot.val();
                    if (cloudData) setData(cloudData);
                    else dbRef.set({ plans: INITIAL_PLANS, expenses: [], checklist: [] });
                });
            }, []);

            useEffect(() => {
                const fetchWeather = async () => {
                    const city = CITY_INFO[activeDate];
                    if (!city || city === 'Sailing') { setWeather({ temp: '--', icon: 'sun' }); return; }
                    try {
                        const res = await fetch(`https://api.openweathermap.org/data/2.5/weather?q=${city}&units=metric&appid=da5f061266679f225509930f3c09b68a`);
                        const wData = await res.json();
                        if (wData.main) setWeather({ temp: Math.round(wData.main.temp) + '°C', icon: 'thermometer' });
                    } catch (e) { console.error(e); }
                };
                fetchWeather();
            }, [activeDate]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, activeDate, data]);

            if (!data) return <div className="flex justify-center items-center h-screen font-black italic text-[#A67B5B]">✈️ LOADING...</div>;

            const moveItem = (index, direction) => {
                let newPlans = [...(data.plans || [])];
                const dayIdx = newPlans.findIndex(p => p.date === activeDate);
                if (dayIdx === -1) return;
                const items = [...newPlans[dayIdx].items];
                const targetIdx = index + direction;
                if (targetIdx < 0 || targetIdx >= items.length) return;
                [items[index], items[targetIdx]] = [items[targetIdx], items[index]];
                newPlans[dayIdx].items = items;
                dbRef.update({ plans: newPlans });
            };

            const Home = () => (
                <div className="p-6 pt-24 animate-in fade-in max-w-md mx-auto pb-32">
                    <div className="text-center mb-10">
                        <h1 className="text-6xl font-diary text-[#A67B5B] leading-none mb-4">Honeymoon</h1>
                        <p className="text-2xl font-diary opacity-40 italic">Bill & Cindy</p>
                    </div>
                    <div className="grid grid-cols-2 gap-4">
                        <div onClick={() => setView('itinerary')} className="col-span-2 h-40 bg-[#B5C0D0] rounded-[2.5rem] p-8 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between text-white">
                            <i data-lucide="map"></i><span className="text-4xl font-black italic text-right">ITINERARY</span>
                        </div>
                        <div onClick={() => setView('flights')} className="h-40 bg-[#F9D949] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="plane"></i><span className="text-xl font-black italic">FLIGHTS</span></div>
                        <div onClick={() => setView('budget')} className="h-40 bg-[#CCD3CA] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between">
                            <i data-lucide="wallet"></i><span className="text-xl font-black italic">BUDGET</span>
                        </div>
                        <div onClick={() => setView('packing')} className="col-span-2 h-20 bg-white rounded-2xl p-6 border-4 border-[#2D2D2D] sticker-shadow flex items-center justify-between sticker-active"><div className="flex items-center gap-4"><i data-lucide="list-checks"></i><span className="font-black italic text-xl">PACKING LIST</span></div><i data-lucide="chevron-right"></i></div>
                    </div>
                </div>
            );

            const Itinerary = () => {
                const dates = Object.keys(CITY_INFO);
                const hotel = getHotel(activeDate);
                const currentDay = (data.plans || []).find(p => p.date === activeDate);
                const currentDayPlans = currentDay ? currentDay.items : [];
                return (
                    <div className="pb-40 max-w-md mx-auto">
                        <div className="bg-[#F5E8DD] sticky top-0 z-40 border-b-4 border-[#2D2D2D] p-6">
                            <div className="flex justify-between items-start mb-6">
                                <button onClick={() => setView('home')}><i data-lucide="chevron-left"></i></button>
                                <div className="text-right">
                                    <div className="font-black text-[10px] opacity-40 uppercase">Location & Weather</div>
                                    <div className="font-black text-xl italic flex items-center justify-end gap-2">
                                        {CITY_INFO[activeDate]} 
                                        <span className="bg-[#2D2D2D] text-white px-2 py-0.5 rounded-lg text-xs not-italic">{weather.temp}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="overflow-x-auto custom-scrollbar pb-4 flex gap-3">
                                {dates.map(d => (
                                    <button key={d} onClick={() => setActiveDate(d)} className={`flex-shrink-0 w-14 py-4 rounded-2xl border-4 border-[#2D2D2D] font-black ${activeDate === d ? 'bg-[#2D2D2D] text-white sticker-shadow' : 'bg-white opacity-40'}`}>{d}</button>
                                ))}
                            </div>
                        </div>
                        <div className="p-6 timeline-line relative space-y-6">
                            {hotel && (
                                <div className="flex gap-6 relative z-10">
                                    <div className="w-10 h-10 rounded-full border-4 border-[#2D2D2D] bg-[#F9D949] flex items-center justify-center sticker-shadow text-xl">🏨</div>
                                    <div className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-[1.5rem] p-4 sticker-shadow">
                                        <a href={hotel.link} target="_blank" className="font-black text-md underline decoration-dashed hover:text-blue-600 transition-colors">{hotel.name}</a>
                                        <div className="text-[10px] font-black opacity-60 mt-1">{hotel.note}</div>
                                    </div>
                                </div>
                            )}
                            {currentDayPlans.map((item, idx) => (
                                <div key={item.id} className="flex gap-6 relative z-10 group">
                                    <div className={`w-10 h-10 rounded-full border-4 border-[#2D2D2D] flex items-center justify-center sticker-shadow ${item.highlight ? 'bg-red-500 text-white' : 'bg-white'}`}>{item.icon || '📍'}</div>
                                    <div className={`flex-1 bg-white border-4 border-[#2D2D2D] rounded-[1.5rem] p-4 sticker-shadow ${item.highlight ? 'border-red-500' : ''}`}>
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-[10px] font-black opacity-30 italic">{item.time}</span>
                                            <div className="flex gap-2">
                                                <button onClick={() => moveItem(idx, -1)} className="p-1 hover:bg-gray-100 rounded"><i data-lucide="chevron-up" size={16}></i></button>
                                                <button onClick={() => moveItem(idx, 1)} className="p-1 hover:bg-gray-100 rounded"><i data-lucide="chevron-down" size={16}></i></button>
                                                <button onClick={() => {
                                                    const newPlans = data.plans.map(p => p.date === activeDate ? { ...p, items: p.items.filter(i => i.id !== item.id) } : p);
                                                    dbRef.update({ plans: newPlans });
                                                }} className="text-red-500 p-1"><i data-lucide="trash-2" size={14}></i></button>
                                            </div>
                                        </div>
                                        <div className={`font-black ${item.highlight ? 'text-red-500' : ''}`}>{item.title}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <button onClick={() => setShowAddModal(true)} className="fixed bottom-24 left-1/2 -translate-x-1/2 w-[80%] py-5 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-full font-black text-2xl sticker-shadow sticker-active">+ ADD PLAN</button>
                    </div>
                );
            };

            const Flights = () => {
                const flights = [
                    { date: '21.05', day: 'Wed', flight: 'CI835', from: 'TPE (T2)', to: 'BKK (T1)', time: '13:30 - 16:20', dur: '3:50h', trans: '6h 15m' },
                    { date: '21.05', day: 'Wed', flight: 'DE2367', from: 'BKK (T1)', to: 'FRA (T1)', time: '22:35 - 06:00+1', dur: '12:25h', trans: '2h 00m' },
                    { date: '22.05', day: 'Thu', flight: 'DE4439', from: 'FRA (T1)', to: 'FCO (T3)', time: '08:00 - 09:50', dur: '1:50h' },
                    { date: '02.06', day: 'Tue', flight: 'DE4324', from: 'BCN (T1)', to: 'FRA (T1)', time: '17:00 - 19:05', dur: '2:05h', trans: '1h 10m' },
                    { date: '02.06', day: 'Tue', flight: 'DE2366', from: 'FRA (T1)', to: 'BKK (T1)', time: '20:15 - 12:35+1', dur: '11:20h' },
                    { date: '10.06', day: 'Wed', flight: 'VZ566', from: 'BKK (T1)', to: 'TPE (T1)', time: '01:55 - 06:45', dur: '4:50h', isLast: true }
                ];
                return (
                    <div className="p-6 pt-10 animate-in slide-in-from-right pb-32 max-w-md mx-auto">
                        <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-5xl font-black italic mb-10 text-center">Flights</h2>
                        {flights.map((f, i) => (
                            <div key={i} className="mb-10">
                                <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] overflow-hidden sticker-shadow">
                                    <div className="bg-[#F9D949] p-4 font-black border-b-4 border-[#2D2D2D] flex justify-between px-8 italic text-sm">
                                        <span>{f.date} ({f.day})</span>
                                        <a href={`https://www.google.com/search?q=${f.flight}`} target="_blank" className="underline decoration-2">{f.flight}</a>
                                    </div>
                                    <div className="p-8 text-center">
                                        <div className="text-xl font-black mb-1">{f.from} ➔ {f.to}</div>
                                        <div className="text-xl font-black text-red-500 italic mb-3">{f.time} <span className="text-[10px] text-gray-400">({f.dur})</span></div>
                                        <div className="inline-flex items-center gap-3 bg-[#F5E8DD] border-2 border-[#2D2D2D] rounded-full px-5 py-2">
                                            <i data-lucide="briefcase" size={12}></i>
                                            <span className="text-[10px] font-black">
                                                Checked <span className="text-red-500">{f.isLast ? '30kg' : '20kg'}</span> / Carry-on <span className="text-red-500">{f.isLast ? '7kg' : '8kg'}</span>
                                            </span>
                                        </div>
                                    </div>
                                </div>
                                {f.trans && <div className="flex justify-center mt-4"><div className="bg-[#2D2D2D] text-[#F9D949] px-4 py-1 rounded-full text-[10px] font-black sticker-shadow italic">Transfer: {f.trans}</div></div>}
                            </div>
                        ))}
                    </div>
                );
            };

            const Budget = () => {
                const [val, setVal] = useState('');
                const [title, setTitle] = useState('');
                const [curr, setCurr] = useState('EUR');
                const expenses = data.expenses || [];
                const total = expenses.reduce((s, e) => s + (Number(e.amount) * (e.curr === 'EUR' ? 35.5 : 0.92)), 0);
                const addExpense = () => {
                    if(!val || !title) return;
                    dbRef.update({ expenses: [{ id: Date.now(), title, amount: val, curr, time: new Date().toLocaleTimeString() }, ...expenses] });
                    setVal(''); setTitle('');
                };
                return (
                    <div className="p-6 pb-44 max-w-md mx-auto">
                        <button onClick={() => setView('home')} className="mb-6"><i data-lucide="arrow-left"></i></button>
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] p-8 mb-8 sticker-shadow">
                            <div className="flex gap-2 mb-4">
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="品項..." className="flex-1 text-xl font-black outline-none border-b-2 border-dashed bg-transparent" />
                                <button onClick={()=>setCurr(curr==='EUR'?'THB':'EUR')} className="bg-black text-white px-4 rounded-full text-xs font-black">{curr}</button>
                            </div>
                            <input type="number" value={val} onChange={e=>setVal(e.target.value)} className="w-full text-5xl font-black outline-none italic bg-transparent" placeholder="0" />
                            <button onClick={addExpense} className="w-full mt-6 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-2xl font-black sticker-active">ADD RECORD</button>
                        </div>
                        <div className="space-y-4">
                            {expenses.map(e => (
                                <div key={e.id} className="bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex justify-between items-center sticker-shadow">
                                    <div><div className="font-black">{e.title}</div><div className="text-[9px] font-black opacity-30 italic">{e.time}</div></div>
                                    <div className="text-right flex items-center gap-4">
                                        <div>
                                            <div className="font-black text-red-500">{e.curr} {e.amount}</div>
                                            <div className="text-[10px] font-black opacity-30">NT$ {Math.round(e.amount * (e.curr==='EUR'?35.5:0.92)).toLocaleString()}</div>
                                        </div>
                                        <button onClick={() => dbRef.update({ expenses: expenses.filter(i=>i.id!==e.id) })} className="opacity-20"><i data-lucide="trash-2" size={14}></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-1/2 -translate-x-1/2 w-[90%] max-w-md bg-[#2D2D2D] text-[#F9D949] p-5 rounded-3xl border-4 border-white sticker-shadow flex justify-between items-center z-50">
                            <span className="text-xs font-black italic uppercase">Total Spent</span>
                            <span className="text-2xl font-black underline">NT$ {Math.round(total).toLocaleString()}</span>
                        </div>
                    </div>
                );
            };

            const Packing = () => {
                const [text, setText] = useState('');
                const checklist = data.checklist || [];
                return (
                    <div className="p-6 max-w-md mx-auto pb-32">
                        <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-5xl font-black italic mb-8 underline decoration-[#A67B5B]">Packing</h2>
                        <div className="flex gap-4 mb-8">
                            <input value={text} onChange={e=>setText(e.target.value)} placeholder="該帶什麼..." className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black outline-none sticker-shadow" />
                            <button onClick={()=>{ if(text) { dbRef.update({ checklist: [...checklist, {id:Date.now(), text, done:false}] }); setText(''); }}} className="bg-[#2D2D2D] text-white px-6 rounded-2xl font-black sticker-shadow">ADD</button>
                        </div>
                        <div className="space-y-3">
                            {checklist.map(item => (
                                <div key={item.id} className="flex items-center gap-3 group">
                                    <div onClick={() => dbRef.update({ checklist: checklist.map(i => i.id === item.id ? {...i, done: !i.done} : i) })} className={`flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex items-center gap-4 sticker-shadow transition-all ${item.done ? 'opacity-30' : ''}`}>
                                        <div className={`w-6 h-6 border-4 border-[#2D2D2D] rounded ${item.done ? 'bg-[#2D2D2D]' : 'bg-white'}`}></div>
                                        <span className={`text-lg font-black ${item.done ? 'line-through' : ''}`}>{item.text}</span>
                                    </div>
                                    <button onClick={() => dbRef.update({ checklist: checklist.filter(i=>i.id!==item.id) })} className="opacity-0 group-hover:opacity-100 text-red-500"><i data-lucide="trash-2" size={16}></i></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            const AddModal = () => {
                const [time, setTime] = useState('12:00');
                const [title, setTitle] = useState('');
                const [emoji, setEmoji] = useState('📍');
                const [isRed, setIsRed] = useState(false);
                const handleSave = () => {
                    if(!title) return;
                    let newPlans = [...(data.plans || [])];
                    const dayIdx = newPlans.findIndex(p=>p.date===activeDate);
                    const item = { id: Date.now(), time, title, icon: emoji, highlight: isRed };
                    if(dayIdx > -1) newPlans[dayIdx].items = [...(newPlans[dayIdx].items || []), item];
                    else newPlans.push({ date: activeDate, items: [item] });
                    dbRef.update({ plans: newPlans });
                    setShowAddModal(false);
                    setTitle('');
                };
                return (
                    <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-6">
                        <div className="bg-[#F5E8DD] w-full max-w-xs rounded-[3rem] border-4 border-[#2D2D2D] p-8 sticker-shadow">
                            <h3 className="text-2xl font-black mb-6 italic text-center underline">NEW PLAN</h3>
                            <div className="space-y-4">
                                <div className="flex gap-2">
                                    <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-xl p-3 font-black outline-none" />
                                    <input type="text" value={emoji} onChange={e=>setEmoji(e.target.value)} className="w-16 bg-white border-4 border-[#2D2D2D] rounded-xl p-3 text-center outline-none" />
                                </div>
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="做什麼..." className="w-full bg-white border-4 border-[#2D2D2D] rounded-xl p-3 font-black outline-none" />
                                <label className="flex items-center gap-2 font-black italic cursor-pointer"><input type="checkbox" checked={isRed} onChange={e=>setIsRed(e.target.checked)} className="w-5 h-5 border-2 border-black" /> IMPORTANT</label>
                                <div className="flex gap-4 pt-4">
                                    <button onClick={()=>setShowAddModal(false)} className="flex-1 font-black underline italic">BACK</button>
                                    <button onClick={handleSave} className="flex-1 py-3 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-xl font-black italic sticker-active">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="min-h-screen relative overflow-x-hidden">
                    {view === 'home' && <Home />}
                    {view === 'itinerary' && <Itinerary />}
                    {view === 'flights' && <Flights />}
                    {view === 'budget' && <Budget />}
                    {view === 'packing' && <Packing />}
                    {showAddModal && <AddModal />}
                    <nav className="fixed bottom-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-40">
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-full h-16 flex items-center justify-around sticker-shadow">
                            <button onClick={() => setView('home')}><i data-lucide="home"></i></button>
                            <button onClick={() => setView('itinerary')}><i data-lucide="map-pin"></i></button>
                            <button onClick={() => setView('flights')}><i data-lucide="plane"></i></button>
                            <button onClick={() => setView('budget')}><i data-lucide="wallet"></i></button>
                            <button onClick={() => setView('packing')}><i data-lucide="list-checks"></i></button>
                        </div>
                    </nav>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
