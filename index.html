<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Honeymoon 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F5E8DD; -webkit-tap-highlight-color: transparent; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .custom-scrollbar::-webkit-scrollbar { height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2D2D2D; border-radius: 10px; }
        .sticker-shadow { box-shadow: 8px 8px 0px 0px #2D2D2D; }
        .sticker-active:active { box-shadow: 2px 2px 0px 0px #2D2D2D; transform: translate(2px, 2px); }
        .timeline-line::before { content: ''; position: absolute; left: 19px; top: 0; bottom: 0; width: 4px; background: #2D2D2D; opacity: 0.1; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        function App() {
            const [view, setView] = useState('home');
            const [activeDate, setActiveDate] = useState('5/22');
            const [showAddModal, setShowAddModal] = useState(false);

            // --- 飯店數據 ---
            const HOTELS = {
                '5/22': { name: 'Domus Appia 154', note: '✓ 有含早餐 | 入 15:00 退 10:00', map: 'https://maps.app.goo.gl/...' },
                '5/31': { name: 'Aparthotel Silver', note: '✗ 不含早餐 | 入 15:00 退 11:00', map: 'https://maps.app.goo.gl/...' },
                '6/3': { name: 'Gardina Asoke Hotel', note: '✗ 不含早餐 | 入 14:00 退 12:00', map: 'https://maps.app.goo.gl/...' },
                '6/5': { name: 'Eastin Grand Hotel Phayathai', note: '✓ 有含早餐 | 入 14:00 退 12:00', map: 'https://maps.app.goo.gl/...' }
            };

            // --- 行程與清單狀態 ---
            const [plans, setPlans] = useState([
                { date: '5/23', items: [{ id: 1, time: '10:30', title: '【已訂票】梵蒂岡博物館', icon: '🏛️', highlight: true, isFixed: true, map: 'https://...' }] },
                { date: '5/24', items: [{ id: 2, time: '12:10', title: '【已訂票】羅馬競技場', icon: '⚔️', highlight: true, isFixed: true, map: 'https://...' }] },
                { date: '6/1', items: [{ id: 3, time: '14:45', title: '【已訂票】聖家堂 入場', icon: '⛪', highlight: true, isFixed: true, map: 'https://...' }] }
            ]);

            const [expenses, setExpenses] = useState([]);
            const [checklist, setChecklist] = useState([
                { id: 1, text: '護照與簽證', done: false }, { id: 2, text: '歐規轉接頭', done: false }
            ]);

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [view, activeDate, showAddModal]);

            // --- 功能：移動行程 ---
            const movePlan = (date, id, direction) => {
                const dayPlans = plans.find(p => p.date === date);
                if (!dayPlans) return;
                const newItems = [...dayPlans.items];
                const idx = newItems.findIndex(i => i.id === id);
                const targetIdx = direction === 'up' ? idx - 1 : idx + 1;
                if (targetIdx >= 0 && targetIdx < newItems.length) {
                    [newItems[idx], newItems[targetIdx]] = [newItems[targetIdx], newItems[idx]];
                    setPlans(plans.map(p => p.date === date ? { ...p, items: newItems } : p));
                }
            };

            // --- 首頁 ---
            const Home = () => (
                <div className="p-6 pt-20 animate-in fade-in">
                    <h1 className="text-6xl font-black italic text-[#A67B5B] text-center mb-2">Honeymoon</h1>
                    <p className="text-center text-xs tracking-[0.4em] font-black opacity-30 mb-16 uppercase">2026 Adventure</p>
                    <div className="grid grid-cols-2 gap-4">
                        <div onClick={() => setView('itinerary')} className="col-span-2 h-40 bg-[#B5C0D0] rounded-[2.5rem] p-8 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-end text-white"><span className="text-4xl font-black italic">ITINERARY</span></div>
                        <div onClick={() => setView('flights')} className="h-40 bg-[#F9D949] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="plane"></i><span className="text-xl font-black italic">FLIGHTS</span></div>
                        <div onClick={() => setView('budget')} className="h-40 bg-[#CCD3CA] rounded-3xl p-6 border-4 border-[#2D2D2D] sticker-shadow sticker-active flex flex-col justify-between"><i data-lucide="wallet"></i><span className="text-xl font-black italic">BUDGET</span></div>
                        <div onClick={() => setView('packing')} className="col-span-2 h-20 bg-white rounded-2xl p-6 border-4 border-[#2D2D2D] sticker-shadow flex items-center justify-between sticker-active">
                            <div className="flex items-center gap-4"><i data-lucide="list-checks"></i><span className="font-black italic text-xl">PACKING LIST</span></div>
                            <i data-lucide="chevron-right"></i>
                        </div>
                    </div>
                </div>
            );

            // --- 行程頁 ---
            const Itinerary = () => {
                const dates = ["5/21", "5/22", "5/23", "5/24", "5/25", "5/26", "5/27", "5/28", "5/29", "5/30", "5/31", "6/1", "6/2", "6/3", "6/4", "6/5", "6/6", "6/7", "6/8", "6/9", "6/10"];
                const dayInfo = { "5/22":"Rome 22°C", "5/25":"Cruise 21°C", "6/3":"Bangkok 33°C" }[activeDate] || "Travel 25°C";
                return (
                    <div className="animate-in slide-in-from-right pb-40">
                        <div className="bg-white sticky top-0 z-40 border-b-4 border-[#2D2D2D] p-6">
                            <div className="flex justify-between items-center mb-6">
                                <button onClick={() => setView('home')}><i data-lucide="chevron-left"></i></button>
                                <div className="text-right font-black italic">{dayInfo}</div>
                            </div>
                            <div className="overflow-x-auto custom-scrollbar pb-4 flex gap-4">
                                {dates.map(d => (
                                    <button key={d} onClick={() => setActiveDate(d)} className={`flex-shrink-0 w-14 py-4 rounded-2xl border-4 border-[#2D2D2D] font-black ${activeDate === d ? 'bg-[#2D2D2D] text-white sticker-shadow' : 'bg-white opacity-40'}`}>{d}</button>
                                ))}
                            </div>
                        </div>
                        <div className="p-6 timeline-line relative space-y-6">
                            {HOTELS[activeDate] && (
                                <div className="flex gap-6 relative z-10">
                                    <div className="w-10 h-10 rounded-full border-4 border-[#2D2D2D] bg-[#F9D949] flex items-center justify-center shrink-0 sticker-shadow">🏨</div>
                                    <div className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow">
                                        <a href={HOTELS[activeDate].map} target="_blank" className="font-black text-blue-600 underline text-lg">{HOTELS[activeDate].name}</a>
                                        <div className="text-[10px] font-black mt-1 opacity-60">{HOTELS[activeDate].note}</div>
                                    </div>
                                </div>
                            )}
                            {(plans.find(p => p.date === activeDate)?.items || []).map((item) => (
                                <div key={item.id} className="flex gap-6 relative z-10 group">
                                    <div className="w-10 h-10 rounded-full border-4 border-[#2D2D2D] flex items-center justify-center shrink-0 sticker-shadow bg-white">{item.icon}</div>
                                    <div className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-[2rem] p-5 sticker-shadow">
                                        <div className="flex justify-between text-[10px] font-black opacity-30 mb-1">
                                            {item.time}
                                            <div className="flex gap-2 opacity-0 group-hover:opacity-100">
                                                <button onClick={()=>movePlan(activeDate, item.id, 'up')}><i data-lucide="chevron-up" size={12}></i></button>
                                                <button onClick={()=>movePlan(activeDate, item.id, 'down')}><i data-lucide="chevron-down" size={12}></i></button>
                                            </div>
                                        </div>
                                        <div className={`text-lg font-black ${item.highlight ? 'text-red-500' : 'italic'}`}>{item.title}</div>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-0 right-0 px-8 z-40 max-w-md mx-auto">
                            <button onClick={() => setShowAddModal(true)} className="w-full py-5 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-full font-black text-2xl sticker-shadow sticker-active">+ ADD PLAN</button>
                        </div>
                    </div>
                );
            };

            // --- 航班頁 ---
            const Flights = () => (
                <div className="p-6 pt-10 animate-in slide-in-from-right pb-32">
                    <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                    <h2 className="text-5xl font-black italic mb-10 text-center">Flights</h2>
                    {[
                        { date: '21.05', flight: 'CI835', from: 'TPE', to: 'BKK', time: '13:30 - 16:20', bag: '託運 20kg / 手提 8kg' },
                        { date: '10.06', flight: 'VZ566', from: 'BKK', to: 'TPE', time: '01:55 - 06:45', bag: '託運 30kg / 手提 7kg' }
                    ].map((f, i) => (
                        <div key={i} className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] mb-10 overflow-hidden sticker-shadow text-center">
                            <div className="bg-[#F9D949] p-4 font-black border-b-4 border-[#2D2D2D]">{f.date} | {f.flight}</div>
                            <div className="p-8">
                                <div className="text-4xl font-black mb-2">{f.from} ➔ {f.to}</div>
                                <div className="text-3xl font-black text-red-500 italic mb-4">{f.time}</div>
                                <div className="text-xs font-black opacity-40 uppercase border-t pt-4">Baggage: {f.bag}</div>
                            </div>
                        </div>
                    ))}
                </div>
            );

            // --- 記帳頁 ---
            const Budget = () => {
                const [val, setVal] = useState('');
                const [title, setTitle] = useState('');
                const [curr, setCurr] = useState('EUR');
                const rate = curr === 'EUR' ? 35.5 : 0.92;
                const total = expenses.reduce((s, e) => s + e.twd, 0);
                return (
                    <div className="p-6 animate-in slide-in-from-right pb-44">
                        <button onClick={() => setView('home')} className="mb-6"><i data-lucide="arrow-left"></i></button>
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-[2.5rem] p-8 mb-8 sticker-shadow">
                            <div className="flex justify-between mb-4"><span className="font-black opacity-30 uppercase">Budgeting</span><button onClick={()=>setCurr(curr==='EUR'?'THB':'EUR')} className="bg-[#2D2D2D] text-white px-4 py-1 rounded-full text-xs">➔ {curr==='EUR'?'泰銖':'歐元'}</button></div>
                            <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="品項名稱..." className="w-full text-xl font-black outline-none mb-4 border-b-2 border-dashed border-gray-200 pb-2" />
                            <input type="number" value={val} onChange={e=>setVal(e.target.value)} className="w-full text-6xl font-black outline-none italic" placeholder="0" />
                            <div className="text-2xl text-blue-600 font-black mt-2">≈ NT$ {val ? Math.round(val * rate).toLocaleString() : 0}</div>
                            <button onClick={() => {
                                if(!val || !title) return;
                                setExpenses([{ id: Date.now(), title, amount: val, curr, twd: Math.round(val*rate) }, ...expenses]);
                                setVal(''); setTitle('');
                            }} className="w-full mt-6 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-2xl font-black text-xl italic sticker-active">CONFIRM</button>
                        </div>
                        <div className="space-y-4">
                            {expenses.map(e => (
                                <div key={e.id} className="bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex justify-between items-center sticker-shadow">
                                    <div className="font-black text-xl">{e.title}</div>
                                    <div className="flex items-center gap-4 text-right">
                                        <div><div className="text-lg font-black text-red-500">{e.curr} {e.amount}</div><div className="text-[10px] font-bold opacity-30">NT$ {e.twd}</div></div>
                                        <button onClick={()=>setExpenses(expenses.filter(i=>i.id!==e.id))} className="text-gray-300"><i data-lucide="trash-2" size={16}></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="fixed bottom-24 left-0 right-0 px-8 max-w-md mx-auto"><div className="bg-[#2D2D2D] text-[#F9D949] p-6 rounded-[2rem] border-4 border-white flex justify-between items-center sticker-shadow"><span className="font-black italic">TOTAL</span><span className="text-3xl font-black">NT$ {total.toLocaleString()}</span></div></div>
                    </div>
                );
            };

            // --- 清單頁 ---
            const Packing = () => {
                const [text, setText] = useState('');
                return (
                    <div className="p-6 pt-10 animate-in slide-in-from-right">
                        <button onClick={() => setView('home')} className="mb-8"><i data-lucide="arrow-left"></i></button>
                        <h2 className="text-5xl font-black italic mb-8">Packing</h2>
                        <div className="flex gap-4 mb-8">
                            <input value={text} onChange={e=>setText(e.target.value)} placeholder="新增行李..." className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black outline-none" />
                            <button onClick={()=>{ if(text) setChecklist([...checklist, {id:Date.now(), text, done:false}]); setText(''); }} className="bg-[#2D2D2D] text-white p-4 rounded-2xl sticker-shadow"><i data-lucide="plus"></i></button>
                        </div>
                        <div className="space-y-4">
                            {checklist.map(item => (
                                <div key={item.id} className="flex gap-4 items-center group">
                                    <div onClick={() => setChecklist(checklist.map(i => i.id === item.id ? {...i, done: !i.done} : i))} className={`flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-5 flex items-center gap-4 sticker-shadow ${item.done ? 'opacity-40 grayscale' : ''}`}>
                                        <div className={`w-6 h-6 border-2 border-black rounded ${item.done ? 'bg-black' : ''}`}></div>
                                        <span className={`text-lg font-black ${item.done ? 'line-through' : ''}`}>{item.text}</span>
                                    </div>
                                    <button onClick={() => setChecklist(checklist.filter(i => i.id !== item.id))} className="text-red-500 opacity-0 group-hover:opacity-100 transition-opacity"><i data-lucide="trash-2"></i></button>
                                </div>
                            ))}
                        </div>
                    </div>
                );
            };

            // --- 新增行程彈窗 ---
            const AddModal = () => {
                const [time, setTime] = useState('12:00');
                const [title, setTitle] = useState('');
                const [emoji, setEmoji] = useState('📍');
                const [isRed, setIsRed] = useState(false);
                return (
                    <div className="fixed inset-0 z-[100] bg-black/60 backdrop-blur-md flex items-center justify-center p-6">
                        <div className="bg-[#F5E8DD] w-full max-w-xs rounded-[3rem] border-4 border-[#2D2D2D] p-10 sticker-shadow">
                            <h3 className="text-3xl font-black mb-8 italic text-center underline">Add Plan</h3>
                            <div className="space-y-6">
                                <div className="flex gap-2">
                                    <input type="time" value={time} onChange={e=>setTime(e.target.value)} className="flex-1 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black" />
                                    <input type="text" value={emoji} onChange={e=>setEmoji(e.target.value)} className="w-16 bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 text-center" />
                                </div>
                                <input type="text" value={title} onChange={e=>setTitle(e.target.value)} placeholder="名稱..." className="w-full bg-white border-4 border-[#2D2D2D] rounded-2xl p-4 font-black" />
                                <label className="flex items-center gap-2 font-black italic"><input type="checkbox" checked={isRed} onChange={e=>setIsRed(e.target.checked)} className="w-5 h-5 border-2 border-black" /> 標記重點</label>
                                <div className="flex gap-4">
                                    <button onClick={()=>setShowAddModal(false)} className="flex-1 py-4 bg-white border-4 border-[#2D2D2D] rounded-xl font-black">BACK</button>
                                    <button onClick={()=>{
                                        const newItem = { id: Date.now(), time, title, icon: emoji, highlight: isRed };
                                        const datePlans = plans.find(p=>p.date===activeDate);
                                        if(datePlans) datePlans.items.push(newItem);
                                        else plans.push({date:activeDate, items:[newItem]});
                                        setPlans([...plans]); setShowAddModal(false);
                                    }} className="flex-1 py-4 bg-[#F9D949] border-4 border-[#2D2D2D] rounded-xl font-black italic">SAVE</button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="max-w-md mx-auto min-h-screen relative">
                    {view === 'home' && <Home />}
                    {view === 'itinerary' && <Itinerary />}
                    {view === 'flights' && <Flights />}
                    {view === 'budget' && <Budget />}
                    {view === 'packing' && <Packing />}
                    <nav className="fixed bottom-6 left-0 right-0 px-6 z-40 max-w-md mx-auto">
                        <div className="bg-white border-4 border-[#2D2D2D] rounded-full h-16 flex items-center justify-around sticker-shadow">
                            <button onClick={() => setView('home')}><i data-lucide="home"></i></button>
                            <button onClick={() => setView('itinerary')}><i data-lucide="map-pin"></i></button>
                            <button onClick={() => setView('flights')}><i data-lucide="plane"></i></button>
                            <button onClick={() => setView('budget')}><i data-lucide="wallet"></i></button>
                        </div>
                    </nav>
                    {showAddModal && <AddModal />}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
